<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calendar — Monday, April 27, 2026 — Brain Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#121212;--bg2:#1a1a1a;--bg3:#222;--text:#e8e0d8;--muted:#8a8078;--accent:#c4703f;--border:#2a2826;--radius:8px;--font:'DM Sans',system-ui,sans-serif;
--status-done:#3d8c5c;--status-canceled:#8c3d3d;--status-not-started:#b8a070;--status-in-progress:#c4703f;--status-sick:#7a5fbf}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.share-page{max-width:900px;margin:0 auto;padding:32px 24px}
.share-header{border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:24px}
.share-header h1{font-size:22px;font-weight:600;color:var(--text)}
.share-header .meta{font-size:13px;color:var(--muted);margin-top:4px}
.share-header .badge{display:inline-block;background:var(--accent);color:#fff;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;margin-left:8px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.card h2{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.event-card{background:var(--bg3);border-radius:var(--radius);padding:12px 16px;margin-bottom:8px;border-left:4px solid var(--accent)}
.event-card .ev-name{font-weight:600;font-size:14px}.event-card .ev-meta{font-size:12px;color:var(--muted);margin-top:4px}
.kv{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.kv:last-child{border-bottom:none}.kv .k{color:var(--muted);font-size:13px}.kv .v{font-weight:500;font-size:13px}
.footer{text-align:center;color:var(--muted);font-size:11px;margin-top:32px;padding-top:16px;border-top:1px solid var(--border)}
#share-map{height:400px;border-radius:var(--radius);margin-bottom:16px}
.weather-day{display:inline-block;text-align:center;padding:12px 16px;background:var(--bg3);border-radius:var(--radius);margin:4px}
.weather-day .t{font-size:20px;font-weight:600}.weather-day .d{font-size:12px;color:var(--muted)}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
</style>
</head>
<body>
<div class="share-page">
<div class="share-header">
<h1>Calendar — Monday, April 27, 2026</h1>
<div class="meta">Shared on April 25, 2026 at 19:32<span class="badge">Calendar Day</span></div>
</div>
<div class="card"><h2>Monday, April 27, 2026</h2><p style="color:var(--muted);margin-bottom:12px">1 event(s)</p><div class="event-card" style="border-left-color:var(--status-not-started)"><div class="ev-name">Zivildienst</div><div class="ev-meta"><span class="status-dot" style="background:var(--status-not-started)"></span>Not Started &middot; 14:00&ndash;22:00 &middot; 480min &middot; work</div></div></div>
<div class="footer">Generated by Brain Dashboard</div>
</div>
</body>
</html>
