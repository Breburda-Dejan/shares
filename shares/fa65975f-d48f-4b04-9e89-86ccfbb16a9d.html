<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#121212;--bg2:#1a1a1a;--bg3:#222;--bg4:#2a2a2a;--text:#e8e0d8;--muted:#8a8078;--accent:#c4703f;--accent-dim:rgba(196,112,63,.15);--border:#2a2826;--radius:8px;--font:'DM Sans',system-ui,sans-serif;
--green:#3d8c5c;--red:#8c3d3d;--status-done:#3d8c5c;--status-canceled:#8c3d3d;--status-not-started:#b8a070;--status-in-progress:#c4703f;--status-sick:#7a5fbf}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;display:flex;flex-direction:column}
.share-topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.share-topbar h1{font-size:18px;font-weight:600;flex:1}.share-topbar .badge{background:var(--accent);color:#fff;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600}
.share-topbar .meta{font-size:12px;color:var(--muted)}
.share-content{flex:1;overflow:auto;padding:0}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:12px}
.card h2{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.kv:last-child{border-bottom:none}.kv .k{color:var(--muted)}.kv .v{font-weight:500}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;flex-shrink:0}
/* Calendar snapshot styles */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);flex:1}
.cal-dow{text-align:center;padding:8px 4px;font-size:12px;font-weight:600;color:var(--muted);background:var(--bg2)}
.cal-cell{background:var(--bg2);padding:4px;min-height:90px;cursor:default;position:relative;overflow:hidden}
.cal-cell.other{opacity:.4}.cal-cell.today{background:var(--accent-dim)}
.cal-cell .day-num{font-size:12px;font-weight:600;margin-bottom:2px;color:var(--muted)}
.cal-cell .day-num .ct{font-size:10px;background:var(--accent-dim);color:var(--accent);border-radius:999px;padding:0 4px;margin-left:4px}
.cal-ev{font-size:11px;padding:2px 4px;margin:1px 0;border-radius:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;transition:background .15s}
.cal-ev:hover{filter:brightness(1.3)}
.s-done{background:var(--status-done)}.s-canceled{background:var(--status-canceled)}.s-not-started{background:var(--status-not-started)}.s-in-progress{background:var(--status-in-progress)}.s-sick{background:var(--status-sick)}
.more-pill{font-size:10px;color:var(--muted);padding:1px 4px;cursor:pointer}.more-pill:hover{color:var(--accent)}
/* Event detail overlay */
.ev-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:1000;justify-content:center;align-items:center}
.ev-overlay.open{display:flex}.ev-detail{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:500px;width:90%;max-height:80vh;overflow:auto}
.ev-detail h3{font-size:18px;margin-bottom:12px}.ev-detail .close{float:right;cursor:pointer;font-size:20px;color:var(--muted);background:none;border:none}
.ev-detail .close:hover{color:var(--text)}
/* Month header in multi-month view */
.month-section{margin:16px 12px}.month-section h2{font-size:16px;margin-bottom:8px;color:var(--accent)}
.month-grid-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
/* Map snapshot styles */
#share-map{width:100%;min-height:400px}
.map-controls{background:var(--bg2);border-top:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
.map-controls label{font-size:12px;color:var(--muted)}
.map-controls input,.map-controls select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px}
.map-controls button{background:var(--accent);color:#fff;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.map-controls button.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.timeline-bar{position:relative;flex:1;min-width:200px;height:32px;background:var(--bg3);border-radius:4px;overflow:hidden}
.timeline-fill{height:100%;background:var(--accent-dim);pointer-events:none}.timeline-thumb{position:absolute;top:0;bottom:0;width:3px;background:var(--accent)}
.timeline-label{position:absolute;top:50%;transform:translateY(-50%);right:8px;font-size:11px;color:var(--muted);pointer-events:none}
/* Weather */
.wx-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;padding:12px}
.wx-card{background:var(--bg3);border-radius:var(--radius);padding:20px;text-align:center}
.wx-card .temp{font-size:28px;font-weight:700}.wx-card .day{font-size:13px;color:var(--muted);margin-bottom:8px}.wx-card .cond{font-size:14px;margin:4px 0}
.wx-card .detail{font-size:12px;color:var(--muted)}
</style>
</head>

var statusColors={'done':'var(--status-done)','canceled':'var(--status-canceled)','not started':'var(--status-not-started)','in progress':'var(--status-in-progress)','sick':'var(--status-sick)'};
function slugify(s){return(s||'not-started').toLowerCase().replace(/\s+/g,'-')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtTime(ts){var d=new Date(ts*1000);return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)}
function pad(n){return('0'+n).slice(-2)}
function eventsForDay(y,m,d){var ds=new Date(y,m,d).getTime()/1000,de=ds+86400;return events.filter(function(e){return e.is_all_day?(e.start_ts<de&&e.end_ts>=ds):(e.start_ts>=ds&&e.start_ts<de)}).sort(function(a,b){return a.start_ts-b.start_ts})}
function showEvent(ev){
  var o=document.getElementById('evOverlay'),d=document.getElementById('evDetail');
  var sc=ev.custom_color||statusColors[(ev.status||'').toLowerCase()]||'var(--accent)';
  var h='<button class="close" onclick="document.getElementById(\'evOverlay\').classList.remove(\'open\')">&times;</button>';
  h+='<h3 style="border-left:4px solid '+sc+';padding-left:12px">'+esc(ev.name)+'</h3>';
  if(opts.include_status)h+='<div class="kv"><span class="k">Status</span><span class="v"><span class="status-dot" style="background:'+sc+'"></span>'+esc(ev.status)+'</span></div>';
  if(opts.include_times&&ev.start_ts){h+='<div class="kv"><span class="k">Time</span><span class="v">'+fmtTime(ev.start_ts)+(ev.end_ts?'&ndash;'+fmtTime(ev.end_ts):'')+'</span></div>';if(ev.duration_minutes)h+='<div class="kv"><span class="k">Duration</span><span class="v">'+ev.duration_minutes+' min</span></div>';}

  if(opts.include_status&&ev.priority)h+='<div class="kv"><span class="k">Priority</span><span class="v">'+esc(ev.priority)+'</span></div>';
  if(opts.include_location&&ev.location)h+='<div class="kv"><span class="k">Location</span><span class="v">'+esc(ev.location)+'</span></div>';
  if(opts.include_status&&ev.travel_mode)h+='<div class="kv"><span class="k">Travel</span><span class="v">'+esc(ev.travel_mode)+'</span></div>';

window._showEv=function(idx){if(events[idx])showEvent(events[idx])};
function renderMonthGrid(year,month,container){
  var fd=new Date(year,month,1),ld=new Date(year,month+1,0),dow=(fd.getDay()+6)%7,td=ld.getDate();
  var today=new Date();today.setHours(0,0,0,0);

  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(function(d){html+='<div class="cal-dow">'+d+'</div>'});
  var prevLast=new Date(year,month,0).getDate();
  for(var i=dow-1;i>=0;i--)html+=dayCell(year,month===0?year-1:year,month===0?11:month-1,prevLast-i,true,false);

  for(var i=1;i<=trailing;i++)html+=dayCell(year,month===11?year+1:year,month===11?0:month+1,i,true,false);

}
function dayCell(contextYear,y,m,day,isOther,isToday){

  var h='<div class="cal-cell'+(isOther?' other':'')+(isToday?' today':'')+'"><div class="day-num">'+day+(devs.length?'<span class="ct">'+devs.length+'</span>':'')+'</div>';
  devs.slice(0,maxV).forEach(function(ev){

    var y=cur.getFullYear(),m=cur.getMonth(),d=cur.getDate();
    var devs=eventsForDay(y,m,d);
    h+='<div class="card"><h2>'+cur.toLocaleDateString('default',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+'</h2>';

      if(opts.include_status)parts.push(esc(ev.status));

      h+=parts.join(' &middot; ')+'</div></div>';
    });

  }
  root.innerHTML=h;

  // Month grid(s)
  var cur=new Date(startDate.getFullYear(),startDate.getMonth(),1);
  var endM=new Date(endDate.getFullYear(),endDate.getMonth(),1);

    sec.innerHTML='<h2>'+cur.toLocaleString('default',{month:'long',year:'numeric'})+'</h2><div class="month-grid-wrap" id="mg_'+cur.getFullYear()+'_'+cur.getMonth()+'"></div>';
    root.appendChild(sec);
    var wrap=sec.querySelector('.month-grid-wrap');
    renderMonthGrid(cur.getFullYear(),cur.getMonth(),wrap);
    cur.setMonth(cur.getMonth()+1);
  }
}
})();
